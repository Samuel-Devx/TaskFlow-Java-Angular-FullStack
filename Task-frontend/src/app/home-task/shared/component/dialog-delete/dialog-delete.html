<h2 mat-dialog-title>Excluir ?</h2>
<mat-dialog-content>
  <p>Tem certeza que deseja excluir essa task?</p>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button mat-dialog-close (click)="captureStatus(false)">Não</button>
  <button mat-button mat-dialog-close (click)="captureStatus(true)">Sim</button>
</mat-dialog-actions>
